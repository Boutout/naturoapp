# NaturoApp — service nginx (site statique PWA)
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip pour alléger
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
  gzip_min_length 512;

  # HTML, JS, CSS et le service worker : toujours revalider pour que les
  # mises à jour arrivent immédiatement (etag → 304 si inchangé).
  location ~* \.(html|js|css)$ { add_header Cache-Control "no-cache, must-revalidate"; }
  location = /sw.js          { add_header Cache-Control "no-cache, must-revalidate"; }
  location = /manifest.json  { types {} default_type application/manifest+json; add_header Cache-Control "no-cache"; }

  # Assets immuables : cache long
  location ~* \.(png|jpg|jpeg|svg|webp|ico|woff2?)$ { add_header Cache-Control "public, max-age=2592000"; }

  location / { try_files $uri $uri/ =404; }

  # Petite santé pour les checks
  location = /healthz { add_header Content-Type text/plain; return 200 "ok\n"; }
}
