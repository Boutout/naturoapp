  <script>try{var t=localStorage.getItem('naturoapp_theme');if(t==='dark'||((!t||t==='auto')&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.setAttribute('data-theme','dark');}else{document.documentElement.setAttribute('data-theme','light');}if(!sessionStorage.getItem('naturoapp_active'))document.documentElement.classList.add('pre-lock');}catch(e){}</script>
  <style>
    .carte-intro { text-align:center; margin-bottom:18px; }
    .carte-intro h1 { font-size:26px; }
    .carte-intro p { color:var(--c-mid); font-size:14px; margin-top:4px; }
    .mind-wrap { background:var(--c-white); border:1px solid var(--c-border); border-radius:var(--r-lg);
      box-shadow:var(--shadow-sm); padding:10px; overflow-x:auto; }
    .mind { width:100%; min-width:560px; height:auto; display:block; }
    .mind__link { stroke:var(--c-green-light); stroke-width:2.5; opacity:.55; }
    .mind__node rect { fill:var(--c-white); stroke:var(--c-green); stroke-width:2; transition:all .15s; }
    .mind__node text { fill:var(--c-dark); font-family:var(--font-body); font-size:14px; font-weight:600; }
    .mind a { cursor:pointer; }
    .mind a:hover .mind__node rect { fill:var(--c-green-pale); stroke-width:2.5; }
    .mind__center { fill:url(#grad); }
    .mind__center-txt { fill:#fff; font-family:var(--font-display); font-weight:700; font-size:19px; }
    .carte-hint { text-align:center; color:var(--c-mid); font-size:12.5px; margin-top:12px; }
    [data-theme="dark"] .mind__node rect { fill:var(--c-white); }
    [data-theme="dark"] .mind__node text { fill:var(--c-dark); }
  </style>
</head>

<script src="app.js"></script>
<script>
const { escapeHtml } = window.APP;

const NODES = [
  { label: 'Terrain & Vitalité', course: 'c-piliers' },
  { label: 'Émonctoires', course: 'c-emonctoires' },
  { label: 'Tempéraments', course: 'c-temperaments' },
  { label: 'Système nerveux', course: 'c-sn-autonome' },
  { label: 'Hydrothérapie', course: 'c-hydrotherapie' },
  { label: 'Phytothérapie', course: 'c-phytotherapie' },
  { label: 'Sommeil & stress', course: 'c-stress' },
  { label: 'Nutrition / acido-base', course: 'c-acido-basique' }
];

function buildMind() {
  const W = 860, H = 660, cx = W / 2, cy = H / 2, R = 240, NW = 178, NH = 50;
  let s = `<svg viewBox="0 0 ${W} ${H}" class="mind" role="img" aria-label="Carte mentale de la naturopathie">
    <defs><linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F6B50"/><stop offset="1" stop-color="#1A5C45"/></linearGradient></defs>`;
  const pts = NODES.map((n, i) => {
    const a = (i / NODES.length) * 2 * Math.PI - Math.PI / 2;
    return { x: cx + Math.cos(a) * R, y: cy + Math.sin(a) * R };
  });
  // branches
  pts.forEach(p => { s += `<line class="mind__link" x1="${cx}" y1="${cy}" x2="${p.x.toFixed(0)}" y2="${p.y.toFixed(0)}"/>`; });
  // nodes
  NODES.forEach((n, i) => {
    const p = pts[i];
    s += `<a href="cours.html?open=${n.course}"><g class="mind__node">
      <rect x="${(p.x - NW / 2).toFixed(0)}" y="${(p.y - NH / 2).toFixed(0)}" width="${NW}" height="${NH}" rx="15"/>
      <text x="${p.x.toFixed(0)}" y="${(p.y + 5).toFixed(0)}" text-anchor="middle">${escapeHtml(n.label)}</text>
    </g></a>`;
  });
  // centre
  s += `<circle class="mind__center" cx="${cx}" cy="${cy}" r="66"/>
    <text class="mind__center-txt" x="${cx}" y="${cy - 4}" text-anchor="middle">Naturo-</text>
    <text class="mind__center-txt" x="${cx}" y="${cy + 18}" text-anchor="middle">pathie</text>`;
  s += `</svg>`;
  document.getElementById('mind').innerHTML = s;
}

window.APP.onReady(buildMind);
</script>
</body>
