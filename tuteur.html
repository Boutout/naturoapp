<script>
const { icon, escapeHtml, getAIKey, getAIModel, getAIProviderConfig, tts, State } = window.APP;
function curModel() { const p = getAIProviderConfig(); return getAIModel() || (p.models[0] && p.models[0].id) || ''; }

function fmt(t) {
  return escapeHtml(t)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function buildSystemPrompt() {
  const C = window.NATURO_CONTENT || { cours: [] };
  const titres = (C.cours || []).map(c => c.titre).join(', ');
  return [
    "Tu es le tuteur personnel de naturopathie de Clara, une étudiante qui prépare son examen de naturopathie.",
    "Réponds toujours en français, de façon claire, pédagogique, structurée et bienveillante.",
    "Tu peux : expliquer un concept avec des exemples et des moyens mnémotechniques, générer des QCM, corriger les réponses de Clara, créer des fiches de révision synthétiques, et l'interroger.",
    "Reste dans le périmètre de la naturopathie et des sciences associées (anatomie, physiologie, biochimie, nutrition, micronutrition, phytothérapie, hydrologie, techniques manuelles, etc.).",
    "IMPORTANT : tu fais de la PÉDAGOGIE, jamais du conseil médical personnalisé. N'établis aucun diagnostic pour une personne réelle. Rappelle, quand c'est pertinent, que la naturopathie est complémentaire et ne remplace pas un avis médical.",
    "Sois concis mais complet ; utilise des listes et du gras (**texte**) pour la lisibilité.",
    titres ? ("Le programme de Clara couvre notamment ces cours : " + titres + ".") : ""
  ].filter(Boolean).join('\n');
}

const SYSTEM = buildSystemPrompt();
const CHAT_LS = 'naturoapp_tutor_chat';
let conversation = [];   // { role: 'user'|'assistant', content: '...' }
let busy = false;

function loadChat() { try { conversation = JSON.parse(localStorage.getItem(CHAT_LS) || '[]'); } catch (e) { conversation = []; } }
function saveChat() { try { localStorage.setItem(CHAT_LS, JSON.stringify(conversation.slice(-40))); } catch (e) {} }

const body = document.getElementById('tut-body');

function renderSetup() {
  body.innerHTML = `
    <div class="tut-setup">
      <span data-icon="sparkles"></span>
      <h2>Active ton tuteur IA</h2>
      <p>Choisis ton IA et ajoute ta <b>clé personnelle</b> dans les Réglages — elle reste sur ton appareil. Au choix : <b>GPT</b> ou <b>Claude</b> (les plus simples), ou des options <b>moins chères</b> (Gemini, Mistral, DeepSeek, Qwen, Kimi, GLM).</p>
      <p style="font-size:12.5px;">Conseil : commence par <b>GPT-4o mini</b> (économique et fiable). Crée une clé sur platform.openai.com.</p>
      <a href="reglages.html#tuteur" class="btn btn-primary btn-lg" style="margin-top:14px;"><span data-icon="settings"></span> Configurer mon IA</a>
    </div>`;
  window.APP.hydrateIcons(body);
}

function renderChat() {
  body.innerHTML = `
    <div class="chat-log" id="chat-log">
      <div class="tut-welcome" id="tut-welcome">
        <div style="font-size:15px;">Pose-moi une question, ou choisis un point de départ :</div>
        <div class="tut-chips">
          <button class="tut-chip" data-q="Explique-moi simplement le rôle des émonctoires avec un moyen mnémotechnique.">Explique un concept</button>
          <button class="tut-chip" data-q="Génère-moi un QCM de 5 questions sur la phytothérapie, sans les réponses. Je répondrai ensuite.">Génère un QCM</button>
          <button class="tut-chip" data-q="Interroge-moi : pose-moi une question d'examen de naturopathie et attends ma réponse pour la corriger.">Interroge-moi</button>
          <button class="tut-chip" data-q="Fais-moi une fiche de révision synthétique sur les tempéraments hippocratiques.">Crée une fiche</button>
          <button class="tut-chip" id="chip-quiz">🎮 Quiz jouable</button>
          <button class="tut-chip" id="chip-weak">🎯 Quiz sur mes points faibles</button>
          <button class="tut-chip" id="chip-explain">💡 Explique mes points faibles</button>
        </div>
      </div>
    </div>
    <div class="tut-bar">
      <textarea id="tut-input" rows="1" placeholder="Écris ta question…" autocomplete="off"></textarea>
      <button class="tut-send" id="tut-send" aria-label="Envoyer"><span data-icon="send"></span></button>
    </div>
    <p class="tut-disclaimer">Outil pédagogique — ne remplace pas un avis médical. ${escapeHtml(getAIProviderConfig().nom)} · ${escapeHtml(curModel())}.</p>`;
  window.APP.hydrateIcons(body);

  const input = document.getElementById('tut-input');
  const sendBtn = document.getElementById('tut-send');

  input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 140) + 'px'; });
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  sendBtn.addEventListener('click', send);
  body.querySelectorAll('.tut-chip[data-q]').forEach(c => c.addEventListener('click', () => { input.value = c.dataset.q; send(); }));
  const quizChip = document.getElementById('chip-quiz');
  if (quizChip) quizChip.addEventListener('click', () => generateQuiz());
  const weakChip = document.getElementById('chip-weak');
  if (weakChip) weakChip.addEventListener('click', generateWeakQuiz);
  const explainChip = document.getElementById('chip-explain');
  if (explainChip) explainChip.addEventListener('click', explainWeak);

  // restaure l'historique sauvegardé (+ actions sur les réponses IA)
  conversation.forEach(m => { const d = addBubble(m.role, fmt(m.content)); if (m.role === 'assistant') aiActions(d, m.content); });
  updateNewBtn(); updateTtsBtn();
  input.focus();
}

function updateNewBtn() {
  const b = document.getElementById('tut-new');
  if (b) b.style.display = (getAIKey() && conversation.length) ? 'inline-flex' : 'none';
}

// ── Lecture vocale + impression / fiche ─────────────────────────
let ttsOn = false;
try { ttsOn = localStorage.getItem('naturoapp_tutor_tts') === '1'; } catch (e) {}

function updateTtsBtn() {
  const b = document.getElementById('tut-tts');
  if (!b) return;
  b.style.display = getAIKey() ? 'inline-flex' : 'none';
  b.innerHTML = (ttsOn ? icon('volume') : icon('volume-x')) + (ttsOn ? ' Voix' : ' Voix');
  b.classList.toggle('active', ttsOn);
}
function readAloud(text) { if (tts && tts.supported()) { tts.cancel(); tts.speak(String(text).replace(/\*\*/g, '')); } }
function printFiche(text) {
  const html = '<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Fiche — NaturoApp</title>' +
    '<style>body{font-family:Georgia,serif;max-width:720px;margin:32px auto;padding:0 22px;line-height:1.65;color:#1C2833}h1{font-size:20px;color:#1A5C45}strong{font-weight:700}</style>' +
    '</head><body><h1>NaturoApp — Fiche du tuteur</h1><div>' + fmt(text) + '</div></body></html>';
  const w = window.open('', '_blank');
  if (!w) { alert("Autorise les fenêtres pop-up pour imprimer."); return; }
  w.document.write(html); w.document.close();
  setTimeout(() => { try { w.print(); } catch (e) {} }, 350);
}
function aiActions(div, text) {
  const row = document.createElement('div');
  row.className = 'tut-actions';
  const s = document.createElement('button');
  s.className = 'tut-mini'; s.innerHTML = icon('volume') + ' Écouter';
  s.addEventListener('click', () => readAloud(text));
  const p = document.createElement('button');
  p.className = 'tut-mini'; p.innerHTML = icon('printer') + ' Imprimer';
  p.addEventListener('click', () => printFiche(text));
  if (tts && tts.supported()) row.appendChild(s);
  row.appendChild(p);
  div.appendChild(row);
}

function addBubble(role, html) {
  const welcome = document.getElementById('tut-welcome');
  if (welcome) welcome.remove();
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = 'bubble bubble--' + (role === 'user' ? 'user' : 'ai');
  div.innerHTML = html;
  log.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return div;
}

async function send() {
  if (busy) return;
  const input = document.getElementById('tut-input');
  const text = (input.value || '').trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';

  addBubble('user', fmt(text));
  conversation.push({ role: 'user', content: text });

  busy = true;
  document.getElementById('tut-send').disabled = true;
  const aiDiv = addBubble('ai', '<span class="tut-cursor"></span>');
  let full = '';

  try {
    await streamAI(conversation, delta => {
      full += delta;
      aiDiv.innerHTML = fmt(full) + '<span class="tut-cursor"></span>';
      aiDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    });
    aiDiv.innerHTML = fmt(full) || '<em>(réponse vide)</em>';
    conversation.push({ role: 'assistant', content: full });
    saveChat();
    if (full) { aiActions(aiDiv, full); if (ttsOn) readAloud(full); }
  } catch (err) {
    aiDiv.classList.remove('bubble--ai');
    aiDiv.innerHTML = `<div class="tut-err">${escapeHtml(err.message || "Erreur lors de l'appel à l'IA.")}</div>`;
    conversation.pop();   // retire le dernier message user pour pouvoir réessayer proprement
    saveChat();
  } finally {
    busy = false;
    document.getElementById('tut-send').disabled = false;
    updateNewBtn();
  }
}

// ── Quiz jouable généré par l'IA → rejouable dans la Révision ──
function parseQuiz(text, topic) {
  let arr;
  try {
    const a = text.indexOf('['), b = text.lastIndexOf(']');
    if (a < 0 || b < 0) return [];
    arr = JSON.parse(text.slice(a, b + 1));
  } catch (e) { return []; }
  if (!Array.isArray(arr)) return [];
  const out = [];
  arr.forEach((item, i) => {
    if (!item || !item.q || !Array.isArray(item.options) || item.options.length < 2) return;
    const opts = item.options.slice(0, 4).map(String);
    let correct = parseInt(item.correct);
    if (isNaN(correct) || correct < 0 || correct >= opts.length) correct = 0;
    out.push({
      id: 'ai-' + i, categorie: 'Quiz IA', sujet: topic,
      question: String(item.q), options: opts, bonne: correct,
      explication: item.exp ? String(item.exp) : '', tags: ['ia']
    });
  });
  return out;
}

function explainWeak() {
  if (busy) return;
  let themes = [];
  try { themes = State.weakThemes(3) || []; } catch (e) {}
  if (!themes.length) themes = ['les bases de la naturopathie'];
  const input = document.getElementById('tut-input');
  if (!input) return;
  input.value = "Voici mes points faibles d'après mes statistiques : " + themes.join(', ') +
    ". Explique-moi les notions clés de chacun simplement, avec un exemple et un moyen mnémotechnique, puis donne-moi un mini-plan pour progresser.";
  send();
}

function generateWeakQuiz() {
  if (busy) return;
  let weak = [];
  try { weak = State.getWeakQuestions(15) || []; } catch (e) {}
  if (!weak.length) {
    addBubble('ai', fmt("Tu n'as pas encore de points faibles repérés — fais d'abord quelques QCM, ou utilise « Quiz jouable » pour choisir un thème."));
    updateNewBtn();
    return;
  }
  const cats = [];
  weak.forEach(q => { const c = (q.categorie || '').split('/')[0].trim(); if (c && !cats.includes(c)) cats.push(c); });
  generateQuiz('mes points faibles (' + cats.slice(0, 5).join(', ') + ')');
}

async function generateQuiz(topicArg) {
  if (busy) return;
  let topic = topicArg;
  if (!topic) {
    topic = (window.prompt('Sur quel thème veux-tu un quiz ?', 'naturopathie générale') || '').trim();
    if (!topic) return;
  }
  busy = true; document.getElementById('tut-send').disabled = true;
  addBubble('user', fmt('🎮 Génère un quiz sur : ' + topic));
  const aiDiv = addBubble('ai', 'Je prépare ton quiz… <span class="tut-cursor"></span>');
  const prompt = 'Génère un quiz de 6 questions à choix multiple (QCM) sur le thème : ' + topic +
    ", dans le cadre d'une révision de naturopathie. Réponds UNIQUEMENT avec un tableau JSON valide, sans aucun texte autour ni balise de code. " +
    'Format exact : [{"q":"énoncé","options":["A","B","C","D"],"correct":0,"exp":"explication courte"}]. ' +
    'Exactement 4 options par question ; "correct" = index (0 à 3) de la bonne réponse.';
  let acc = '';
  try {
    await streamAI([{ role: 'user', content: prompt }], d => { acc += d; });
    const quiz = parseQuiz(acc, topic);
    if (!quiz.length) throw new Error("Je n'ai pas réussi à générer un quiz exploitable. Réessaie (ou change de modèle).");
    localStorage.setItem('naturoapp_ai_quiz', JSON.stringify({ topic, ts: Date.now(), questions: quiz }));
    aiDiv.innerHTML = "J'ai préparé <b>" + quiz.length + ' questions</b> sur « ' + escapeHtml(topic) + ' ».<br>' +
      '<a class="btn btn-primary" style="margin-top:10px;" href="revision.html?mode=aiquiz">' + icon('play') + ' Jouer ce quiz</a>';
    window.APP.hydrateIcons(aiDiv);
  } catch (err) {
    aiDiv.classList.remove('bubble--ai');
    aiDiv.innerHTML = `<div class="tut-err">${escapeHtml(err.message || 'Erreur de génération.')}</div>`;
  } finally {
    busy = false; document.getElementById('tut-send').disabled = false;
  }
}

// Appel direct (navigateur) au fournisseur choisi, en streaming SSE.
// Deux formats : 'anthropic' (Claude) et 'openai' (GPT + compatibles chinois).
async function streamAI(messages, onDelta) {
  const prov = getAIProviderConfig();
  const key = getAIKey();
  if (!key) throw new Error("Aucune clé pour " + prov.nom + ". Configure-la dans les Réglages.");
  const model = curModel();

  let headers, bodyObj;
  if (prov.shape === 'anthropic') {
    headers = {
      'content-type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    };
    bodyObj = {
      model, max_tokens: 2048, system: SYSTEM, stream: true,
      messages: messages.map(m => ({ role: m.role, content: m.content }))
    };
  } else {   // openai-compatible (OpenAI, DeepSeek, Qwen, Moonshot, Zhipu…)
    headers = { 'content-type': 'application/json', 'authorization': 'Bearer ' + key };
    bodyObj = {
      model, max_tokens: 2048, stream: true,
      messages: [{ role: 'system', content: SYSTEM }, ...messages.map(m => ({ role: m.role, content: m.content }))]
    };
  }

  let resp;
  try {
    resp = await fetch(prov.url, { method: 'POST', headers, body: JSON.stringify(bodyObj) });
  } catch (e) {
    throw new Error("Connexion impossible à " + prov.nom + ". Ce fournisseur bloque peut-être les appels directs depuis le navigateur (CORS). Essaie Claude ou GPT, qui les autorisent.");
  }

  if (!resp.ok) {
    let msg = 'Erreur ' + resp.status;
    try { const j = await resp.json(); if (j.error && j.error.message) msg = j.error.message; } catch (e) {}
    if (resp.status === 401) msg = "Clé invalide pour " + prov.nom + ". Vérifie-la dans les Réglages.";
    if (resp.status === 429) msg = "Trop de requêtes ou crédit épuisé (" + prov.nom + "). Réessaie plus tard.";
    throw new Error(msg);
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      const l = line.trim();
      if (!l.startsWith('data:')) continue;
      const data = l.slice(5).trim();
      if (!data || data === '[DONE]') continue;
      let evt;
      try { evt = JSON.parse(data); } catch (e) { continue; }
      if (prov.shape === 'anthropic') {
        if (evt.type === 'content_block_delta' && evt.delta && evt.delta.type === 'text_delta') onDelta(evt.delta.text);
        else if (evt.type === 'error') throw new Error((evt.error && evt.error.message) || 'Erreur du flux IA.');
      } else {
        const d = evt.choices && evt.choices[0] && evt.choices[0].delta;
        if (d && d.content) onDelta(d.content);
      }
    }
  }
}

document.getElementById('tut-new').addEventListener('click', () => {
  if (tts) tts.cancel();
  conversation = []; saveChat(); renderChat();
});
document.getElementById('tut-tts').addEventListener('click', () => {
  ttsOn = !ttsOn;
  try { localStorage.setItem('naturoapp_tutor_tts', ttsOn ? '1' : '0'); } catch (e) {}
  updateTtsBtn();
  if (!ttsOn && tts) tts.cancel();
});

window.APP.onReady(() => {
  try { State.init(); } catch (e) {}   // pour les « points faibles »
  loadChat();
  if (!getAIKey()) { renderSetup(); return; }
  renderChat();
  // ?q=… (depuis un cours, etc.) : pré-remplit et envoie automatiquement
  const q = new URLSearchParams(location.search).get('q');
  if (q) {
    const input = document.getElementById('tut-input');
    if (input) { input.value = q; setTimeout(send, 100); }
  }
});
