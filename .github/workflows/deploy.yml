name: Deploy

# Déploiement continu vers https://naturoapp.konect.xyz
# Déclenché à chaque push sur main (+ manuel). La GitHub Action se connecte
# en SSH au VPS konect et y (re)construit le conteneur statique derrière Traefik.

on:
  # Déploiement MANUEL uniquement : Actions → Deploy → Run workflow.
  # (Pas de déploiement automatique au push — réactive le bloc « push » ci-dessous
  #  quand tu seras prêt à mettre en ligne sur le VPS.)
  workflow_dispatch:
  # push:
  #   branches: [main]

concurrency:
  group: deploy-naturoapp
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Vérifier les secrets requis
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Secrets manquants : VPS_HOST / VPS_USER / VPS_SSH_KEY"
            exit 1
          fi

      - name: Déployer (SSH → VPS)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            REPO_DIR=/home/nova/naturoapp
            # Premier déploiement : clone si le dossier n'existe pas encore
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone git@github.com:Boutout/naturoapp.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch --all --prune
            git reset --hard origin/main
            bash infrastructure/deploy.sh
